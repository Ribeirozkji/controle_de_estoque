    }
  };

  const updItem=(idx,k,v)=>setItens(is=>is.map((it,i)=>i===idx?{...it,[k]:v}:it));
  const remItem=(idx)=>setItens(is=>is.filter((_,i)=>i!==idx));

  const totalGeral=calcTotalItens(itens);

  const emitir=async()=>{
    setErro('');
    if(!natureza){setErro('Informe a natureza da operação');return;}
    if(!dest.nome){setErro('Informe o nome do destinatário');return;}
    if(!dest.cpf&&!dest.cnpj){setErro('Informe CPF ou CNPJ do destinatário');return;}
    if(!itens.length){setErro('Adicione ao menos um item');return;}
    if(itens.some(i=>!i.descricao||!(parseFloat(i.valor_unitario)>0)||!(parseInt(i.quantidade)>0))){setErro('Preencha todos os campos dos itens (descrição, qtd e valor)');return;}
    setLoading(true);
    try{
      const res=await focusNFe.emitir({natureza_operacao:sanitize(natureza),tipo,destinatario:{...dest,nome:sanitize(dest.nome)},itens:itens.map(i=>({...i,descricao:sanitize(i.descricao),quantidade:parseInt(i.quantidade)||1,valor_unitario:parseFloat(i.valor_unitario)||0})),informacoes_adicionais:sanitize(infoAdic)});
      if(!res.ok){setErro(res.msg);return;}
      onEmitida(res.nf);
    }finally{setLoading(false);}
  };

  const sectionTitle=(n,t)=><p style={{fontSize:11,color:'#6366f1',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10,paddingBottom:6,borderBottom:'1px solid #2a3148'}}>{n}. {t}</p>;
  const campo=(label,children,req)=><div style={{marginBottom:14}}>
    <label style={{display:'block',fontSize:11,color:'#64748b',marginBottom:5,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>{label}{req&&<span style={{color:'#ef4444'}}> *</span>}</label>
    {children}
  </div>;

  return <div className="screen" style={{padding:'0 16px 110px'}}>
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'20px 0 16px'}}>
      <button onClick={onBack} style={{background:'#1a1f2e',border:'none',borderRadius:10,padding:8,cursor:'pointer',color:'#94a3b8',display:'flex',fontFamily:'inherit'}}><Ic n="back" s={20}/></button>
      <h1 style={{fontSize:18,fontWeight:800,color:'#e8eaf6'}}>Emitir NF-e</h1>
    </div>

    {erro&&<div style={{background:'#ef444415',border:'1px solid #ef444430',borderRadius:10,padding:'12px 14px',marginBottom:14,color:'#ef4444',fontSize:13}}>{erro}</div>}

    {/* Dados gerais */}
    <div style={{background:'#1a1f2e',borderRadius:16,padding:16,marginBottom:12,border:'1.5px solid #2a3148'}}>
      {sectionTitle(1,'Dados Gerais')}
      {campo('Natureza da Operação',<input value={natureza} onChange={e=>setNatureza(e.target.value)} placeholder="Ex: Venda de Mercadoria" maxLength={60} style={IS_nf}/>,true)}
      {campo('Tipo',<div style={{display:'flex',gap:8}}>
        {[{v:'saida',l:'Saída'},{v:'entrada',l:'Entrada'}].map(x=>(
          <button key={x.v} onClick={()=>setTipo(x.v)} style={{flex:1,background:tipo===x.v?'#6366f1':'#0f1623',border:`1.5px solid ${tipo===x.v?'#6366f1':'#2a3148'}`,borderRadius:10,padding:'10px',color:tipo===x.v?'#fff':'#64748b',cursor:'pointer',fontSize:13,fontWeight:700,fontFamily:'inherit'}}>{x.l}</button>
        ))}
      </div>,true)}
    </div>

    {/* Destinatário */}
    <div style={{background:'#1a1f2e',borderRadius:16,padding:16,marginBottom:12,border:'1.5px solid #2a3148'}}>
      {sectionTitle(2,'Destinatário')}
      {campo('Nome / Razão Social',<input value={dest.nome} onChange={e=>setDest(d=>({...d,nome:e.target.value}))} placeholder="Ex: Maria da Silva" maxLength={60} style={IS_nf}/>,true)}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {campo('CPF',<input value={dest.cpf} onChange={e=>setDest(d=>({...d,cpf:e.target.value}))} placeholder="000.000.000-00" maxLength={14} style={IS_nf}/>)}
        {campo('CNPJ',<input value={dest.cnpj} onChange={e=>setDest(d=>({...d,cnpj:e.target.value}))} placeholder="00.000.000/0001-00" maxLength={18} style={IS_nf}/>)}
      </div>
      {campo('E-mail',<input type="email" value={dest.email} onChange={e=>setDest(d=>({...d,email:e.target.value}))} placeholder="email@dest.com" maxLength={60} style={IS_nf}/>)}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        {campo('Logradouro',<input value={dest.logradouro} onChange={e=>setDest(d=>({...d,logradouro:e.target.value}))} placeholder="Rua, Av..." maxLength={60} style={IS_nf}/>)}
        {campo('Número',<input value={dest.numero} onChange={e=>setDest(d=>({...d,numero:e.target.value}))} placeholder="Nº" maxLength={10} style={IS_nf}/>)}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 60px',gap:10}}>
        {campo('Município',<input value={dest.municipio} onChange={e=>setDest(d=>({...d,municipio:e.target.value}))} placeholder="Cidade" maxLength={60} style={IS_nf}/>)}
        {campo('UF',<select value={dest.uf} onChange={e=>setDest(d=>({...d,uf:e.target.value}))} style={{...IS_nf,appearance:'none'}}>
          <option value="">UF</option>
          {UFS.map(u=><option key={u} value={u}>{u}</option>)}
        </select>)}
      </div>
    </div>

    {/* Itens */}
    <div style={{background:'#1a1f2e',borderRadius:16,padding:16,marginBottom:12,border:'1.5px solid #2a3148'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,paddingBottom:6,borderBottom:'1px solid #2a3148'}}>
        {sectionTitle(3,`Itens (${itens.length})`)}
        <button onClick={()=>addItem(null)} style={{background:'#6366f120',border:'none',borderRadius:8,padding:'5px 10px',color:'#6366f1',cursor:'pointer',fontSize:11,fontWeight:700,display:'flex',alignItems:'center',gap:4,fontFamily:'inherit'}}>
          <Ic n="plus" s={12} c="#6366f1"/> Item
        </button>
      </div>

      {itens.length===0&&<div style={{background:'#0f1623',borderRadius:10,padding:12,marginBottom:8}}>
        <p style={{fontSize:12,color:'#64748b',marginBottom:8}}>Adicionar do estoque:</p>
        <select onChange={e=>{const p=produtos.find(x=>x.id===parseInt(e.target.value));if(p){addItem(p);e.target.value='';}}} style={{...IS_nf,appearance:'none',fontSize:13}}>
          <option value="">Selecionar produto...</option>
          {produtos.map(p=><option key={p.id} value={p.id}>{p.nome} — {fmt(p.precoVenda)}</option>)}
        </select>
      </div>}

      {itens.map((item,idx)=>(
        <div key={idx} style={{background:'#0f1623',borderRadius:12,padding:'12px 14px',marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:12,color:'#6366f1',fontWeight:700}}>Item {idx+1}</span>
            <button onClick={()=>remItem(idx)} style={{background:'#ef444420',border:'none',borderRadius:6,padding:'4px 8px',color:'#ef4444',cursor:'pointer',fontSize:11,fontFamily:'inherit'}}>Remover</button>
          </div>
          {campo('Descrição',<input value={item.descricao} onChange={e=>updItem(idx,'descricao',e.target.value)} placeholder="Nome do produto/serviço" maxLength={120} style={{...IS_nf,fontSize:13}}/>,true)}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            {campo('Qtd',<input type="number" min={1} value={item.quantidade} onChange={e=>updItem(idx,'quantidade',e.target.value)} placeholder="1" style={{...IS_nf,fontSize:13}}/>,true)}
            {campo('Vlr Unit.',<input type="number" min={0} step="0.01" value={item.valor_unitario} onChange={e=>updItem(idx,'valor_unitario',e.target.value)} placeholder="0,00" style={{...IS_nf,fontSize:13}}/>,true)}
            {campo('Un.',<select value={item.unidade_comercial} onChange={e=>updItem(idx,'unidade_comercial',e.target.value)} style={{...IS_nf,appearance:'none',fontSize:13}}>
              {UNITS.map(u=><option key={u} value={u}>{u}</option>)}
            </select>)}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {campo('NCM',<input value={item.ncm} onChange={e=>updItem(idx,'ncm',e.target.value)} placeholder="00000000" maxLength={8} style={{...IS_nf,fontSize:13}}/>)}
            {campo('CFOP',<input value={item.cfop} onChange={e=>updItem(idx,'cfop',e.target.value)} placeholder="5102" maxLength={4} style={{...IS_nf,fontSize:13}}/>)}
          </div>
          <p style={{fontSize:13,color:'#10b981',fontWeight:700,textAlign:'right'}}>Subtotal: {fmt(calcTotalItens([item]))}</p>
        </div>
      ))}

      {itens.length>0&&<>
        <div style={{background:'#10b98120',borderRadius:10,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <span style={{fontSize:13,color:'#10b981',fontWeight:600}}>Total Geral</span>
          <span style={{fontSize:16,color:'#10b981',fontWeight:800}}>{fmt(totalGeral)}</span>
        </div>
        <button onClick={()=>addItem(null)} style={{width:'100%',background:'none',border:'1.5px dashed #2a3148',borderRadius:10,padding:'10px',color:'#64748b',cursor:'pointer',fontSize:13,fontWeight:600,fontFamily:'inherit'}}>+ Adicionar Item</button>
        {/* Atalho: adicionar do estoque */}
        <div style={{marginTop:8}}>
          <select onChange={e=>{const p=produtos.find(x=>x.id===parseInt(e.target.value));if(p){addItem(p);e.target.value='';}}} style={{...IS_nf,fontSize:12,color:'#64748b',appearance:'none'}}>
            <option value="">↑ Adicionar produto do estoque...</option>
            {produtos.map(p=><option key={p.id} value={p.id}>{p.nome} — {fmt(p.precoVenda)}</option>)}
          </select>
        </div>
      </>}
    </div>

    {/* Info adicionais */}
    <div style={{background:'#1a1f2e',borderRadius:16,padding:16,marginBottom:16,border:'1.5px solid #2a3148'}}>
      <div style={{marginBottom:14}}>
        <label style={{display:'block',fontSize:11,color:'#64748b',marginBottom:5,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Informações Adicionais</label>
        <textarea value={infoAdic} onChange={e=>setInfoAdic(e.target.value)} placeholder="Informações adicionais da NF..." maxLength={500} rows={2} style={{...IS_nf,resize:'none',lineHeight:1.5}}/>
      </div>
    </div>

    <div style={{display:'flex',gap:10}}>
      <button onClick={onBack} style={{flex:1,background:'#2a3148',border:'none',borderRadius:12,padding:14,color:'#94a3b8',fontSize:15,cursor:'pointer',fontWeight:600,fontFamily:'inherit'}}>Cancelar</button>
      <button disabled={loading} onClick={emitir} style={{flex:2,background:loading?'#4a5568':'#6366f1',border:'none',borderRadius:12,padding:14,color:'#fff',fontSize:15,cursor:loading?'not-allowed':'pointer',fontWeight:700,fontFamily:'inherit'}}>
        {loading?'Emitindo...':'Emitir Nota Fiscal'}
      </button>
    </div>
  </div>;
}

// ── Componente: Cancelar NF ─────────────────────────────────────────────
function NFCancelar({nf,nfs,onBack,onCancelada}){
  const [just,setJust]=useState('');
  const [loading,setLoading]=useState(false);
  const [erro,setErro]=useState('');
  const IS_nf={width:'100%',background:'#0f1623',border:'1.5px solid #2a3148',borderRadius:10,padding:'11px 14px',color:'#e8eaf6',fontSize:14,outline:'none',boxSizing:'border-box',fontFamily:'inherit'};

  const cancelar=async()=>{
    setErro('');
    if(!just||just.trim().length<15){setErro('Justificativa deve ter ao menos 15 caracteres');return;}
    setLoading(true);
    try{
      const res=await focusNFe.cancelar(nf.id,just,nfs);
      if(!res.ok){setErro(res.msg);return;}
      onCancelada(res.nf);
    }finally{setLoading(false);}
  };

  return <div className="screen" style={{padding:'0 16px 110px'}}>
    <div style={{display:'flex',alignItems:'center',gap:12,padding:'20px 0 16px'}}>
      <button onClick={onBack} style={{background:'#1a1f2e',border:'none',borderRadius:10,padding:8,cursor:'pointer',color:'#94a3b8',display:'flex',fontFamily:'inherit'}}><Ic n="back" s={20}/></button>
      <h1 style={{fontSize:18,fontWeight:800,color:'#e8eaf6'}}>Cancelar NF-e</h1>
    </div>

    <div style={{background:'#ef444415',border:'1px solid #ef444430',borderRadius:14,padding:'14px 16px',marginBottom:16}}>
      <p style={{fontSize:14,color:'#ef4444',fontWeight:700,marginBottom:4}}>NF-e nº {nf.numero} será cancelada</p>
      <p style={{fontSize:12,color:'#94a3b8'}}>Esta ação não pode ser desfeita. Certifique-se que está correto.</p>
    </div>

    <div style={{background:'#1a1f2e',borderRadius:16,padding:16,marginBottom:16,border:'1.5px solid #2a3148'}}>
      <div style={{marginBottom:0}}>
        <label style={{display:'block',fontSize:11,color:'#64748b',marginBottom:5,fontWeight:700,letterSpacing:'.06em',textTransform:'uppercase'}}>Justificativa <span style={{color:'#ef4444'}}>*</span></label>
        <textarea value={just} onChange={e=>setJust(e.target.value)} placeholder="Motivo do cancelamento (mínimo 15 caracteres)..." maxLength={255} rows={4} style={{...IS_nf,resize:'none',lineHeight:1.5}}/>
        <p style={{fontSize:11,color:just.length<15?'#ef4444':'#10b981',marginTop:4}}>{just.length}/255 caracteres {just.length<15?`(faltam ${15-just.length})`:'✓'}</p>
      </div>
    </div>

    {erro&&<div style={{background:'#ef444415',border:'1px solid #ef444430',borderRadius:10,padding:'12px 14px',marginBottom:14,color:'#ef4444',fontSize:13}}>{erro}</div>}

    <div style={{display:'flex',gap:10}}>
      <button onClick={onBack} style={{flex:1,background:'#2a3148',border:'none',borderRadius:12,padding:14,color:'#94a3b8',fontSize:15,cursor:'pointer',fontWeight:600,fontFamily:'inherit'}}>Voltar</button>
      <button disabled={loading||just.trim().length<15} onClick={cancelar} style={{flex:1,background:loading?'#4a5568':'#ef4444',border:'none',borderRadius:12,padding:14,color:'#fff',fontSize:15,cursor:(loading||just.trim().length<15)?'not-allowed':'pointer',fontWeight:700,fontFamily:'inherit',opacity:just.trim().length<15?0.5:1}}>
        {loading?'Cancelando...':'Confirmar Cancelamento'}
      </button>
    </div>
  </div>;
}

// ═══════════════════════════════════════════════════════════════════════
// APP — versão com Auth + NF injetados
// ═══════════════════════════════════════════════════════════════════════
function AppWithAuth(){
  const [logado,setLogado]=useState(()=>authStore.isLoggedIn());
  if(!logado) return <AuthScreen onLogin={()=>setLogado(true)}/>;
  return <AppMain onLogout={()=>{authStore.logout();setLogado(false);}}/>;
}

function AppMain({onLogout}){
  const [aba,setAba]=useState('dashboard');
  const [prod,setProd]=useState(()=>load('ep2',[]));
  const [movs,setMovs]=useState(()=>load('em2',[]));
  const [forns,setForns]=useState(()=>load('ef2',[]));
  const [hist,setHist]=useState(()=>load('eh2',[]));
  const [nfs,setNfs]=useState(()=>load('_nf3',[]));
  const [toasts,setToasts]=useState([]);
  const [dp,setDp]=useState(null);
  const [si,setSi]=useState(false);

  useEffect(()=>{save('ep2',prod);},[prod]);
  useEffect(()=>{save('em2',movs);},[movs]);
  useEffect(()=>{save('ef2',forns);},[forns]);
  useEffect(()=>{save('eh2',hist);},[hist]);
  useEffect(()=>{save('_nf3',nfs);},[nfs]);

  useEffect(()=>{
    const h=e=>{e.preventDefault();setDp(e);setTimeout(()=>setSi(true),2500);};
    window.addEventListener('beforeinstallprompt',h);
    return()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);

  const addT=useCallback((msg,type='success')=>{
    const id=Date.now();
    setToasts(ts=>[...ts,{id,msg,type}]);
    setTimeout(()=>setToasts(ts=>ts.filter(t=>t.id!==id)),3500);
  },[]);

  const instalar=async()=>{
    if(!dp)return;dp.prompt();
    const{outcome}=await dp.userChoice;
    if(outcome==='accepted')addT('App instalado! 🎉','success');
    setDp(null);setSi(false);
  };

  const alertBadge=prod.filter(p=>p.estoqueAtual<=p.estoqueMinimo).length;
  const TABS=[
    {id:'dashboard',    l:'Início',        n:'home'},
    {id:'fornecedores', l:'Fornecedores',  n:'truck'},
    {id:'produtos',     l:'Produtos',      n:'box'},
    {id:'movimentacoes',l:'Moviment.',     n:'move'},
    {id:'nf',           l:'Notas Fiscais', n:'tag'},
    {id:'relatorios',   l:'Relatórios',    n:'chart'},
    {id:'alertas',      l:'Alertas',       n:'alert'},
  ];

  return <div style={{background:'#0f1623',minHeight:'100vh',maxWidth:480,margin:'0 auto',position:'relative'}}>
    <Toast toasts={toasts}/>
    <div style={{paddingTop:'env(safe-area-inset-top,0px)'}}>
      {aba==='dashboard'     &&<Dashboard      produtos={prod} movs={movs} fornecedores={forns} onAlerta={()=>setAba('alertas')}/>}
      {aba==='fornecedores'  &&<Fornecedores   forns={forns} setForns={setForns} produtos={prod} hist={hist} addT={addT}/>}
      {aba==='produtos'      &&<Produtos       produtos={prod} setProd={setProd} movs={movs} forns={forns} hist={hist} setHist={setHist} addT={addT}/>}
      {aba==='movimentacoes' &&<Movimentacoes  produtos={prod} movs={movs} setMovs={setMovs} setProd={setProd} forns={forns} addT={addT}/>}
      {aba==='nf'            &&<NotasFiscais   nfs={nfs} setNfs={setNfs} produtos={prod} addT={addT}/>}
      {aba==='relatorios'    &&<Relatorios     produtos={prod} movs={movs} forns={forns} hist={hist}/>}
      {aba==='alertas'       &&<Alertas        produtos={prod} hist={hist} forns={forns}/>}
    </div>

    {si&&dp&&<div style={{position:'fixed',bottom:80,left:16,right:16,background:'#1a1f2e',borderRadius:16,padding:'14px 16px',border:'1.5px solid #6366f140',display:'flex',alignItems:'center',gap:12,zIndex:900,boxShadow:'0 8px 32px rgba(0,0,0,.5)',animation:'slideDown .4s ease'}}>
      <div style={{background:'#6366f120',borderRadius:10,padding:9,flexShrink:0}}><Ic n="install" s={20} c="#6366f1"/></div>
      <div style={{flex:1,minWidth:0}}>
        <p style={{fontSize:13,color:'#e8eaf6',fontWeight:700}}>Instalar como App</p>
        <p style={{fontSize:11,color:'#64748b',marginTop:1}}>Adicione à tela inicial</p>
      </div>
      <div style={{display:'flex',gap:8,flexShrink:0}}>
        <button onClick={()=>setSi(false)} style={{background:'#2a3148',border:'none',borderRadius:8,padding:'7px 10px',color:'#64748b',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>Não</button>
        <button onClick={instalar} style={{background:'#6366f1',border:'none',borderRadius:8,padding:'7px 12px',color:'#fff',cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'inherit'}}>Instalar</button>
      </div>
    </div>}

    {/* Barra de navegação com userbar */}
    <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,background:'#111827',borderTop:'1px solid #1e2740',zIndex:500,paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
      {/* User bar */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'5px 16px',borderBottom:'1px solid #1e2740'}}>
        <span style={{fontSize:11,color:'#64748b'}}>👤 {authStore.session?.nome||'Usuário'}</span>
        <button onClick={()=>{if(confirm('Sair da conta?')){onLogout();}}} style={{background:'none',border:'none',color:'#ef4444',fontSize:11,cursor:'pointer',fontWeight:600,fontFamily:'inherit'}}>Sair</button>
      </div>
      {/* Tabs */}
      <div style={{display:'flex'}}>
        {TABS.map(t=>{
          const a=aba===t.id;
          const bdg=t.id==='alertas'&&alertBadge>0?alertBadge:0;
          return <button key={t.id} onClick={()=>setAba(t.id)} style={{flex:1,background:'none',border:'none',padding:'8px 1px 10px',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative',fontFamily:'inherit'}}>
            {bdg>0&&<div style={{position:'absolute',top:4,right:'calc(50% - 15px)',background:'#ef4444',borderRadius:10,minWidth:14,height:14,display:'flex',alignItems:'center',justifyContent:'center',fontSize:7,fontWeight:800,color:'#fff',padding:'0 2px'}}>{bdg}</div>}
            <div style={{transition:'transform .18s',transform:a?'scale(1.1)':'scale(1)'}}><Ic n={t.n} s={18} c={a?'#6366f1':'#4a5568'}/></div>
            <span style={{fontSize:8,fontWeight:a?700:500,color:a?'#6366f1':'#4a5568',letterSpacing:'.01em',textAlign:'center',lineHeight:1.2}}>{t.l}</span>
            {a&&<div style={{position:'absolute',bottom:0,left:'50%',transform:'translateX(-50%)',width:16,height:2,background:'#6366f1',borderRadius:'2px 2px 0 0'}}/>}
          </button>;
        })}
      </div>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppWithAuth/>);


  </script>

  <!-- Registro do Service Worker (cache offline / PWA) -->
  <script>
    if ("serviceWorker" in navigator) {
      // Registra o SW apenas depois que a página terminar de carregar
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js")
          .then(r  => console.log("Service Worker registrado:", r.scope))
          .catch(e => console.log("Erro ao registrar Service Worker:", e));
      });
    }
  </script>
