<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <!-- Codificação e viewport para mobile -->
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>

  <!-- Cor da barra de status do navegador -->
  <meta name="theme-color" content="#0f1623"/>

  <!-- Suporte a PWA no Android -->
  <meta name="mobile-web-app-capable" content="yes"/>

  <!-- Suporte a PWA no iOS -->
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Estoque"/>

  <title>Controle de Estoque</title>

  <!-- Manifesto PWA (ícone, nome, modo standalone) -->
  <link rel="manifest" href="manifest.json"/>

  <!-- Ícone para tela inicial do iOS -->
  <link rel="apple-touch-icon" href="icon-192.png"/>

  <!-- ========================================================
       style.css — Estilos globais
       NOTA: O Babel standalone não suporta src externo em
       type="text/babel", por isso CSS e JS ficam inline.
       Os arquivos style.css e app.js separados servem como
       referência de leitura e para quando migrar para um
       bundler (Vite, Webpack, etc).
  ======================================================== -->
  <style>
/* ============================================================
   style.css — Estilos globais do Controle de Estoque
   ============================================================ */

/* ── Reset e base ── */
* {
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  margin: 0;
  padding: 0;
}

/* ── Fundo escuro em toda a página ── */
html, body, #root {
  height: 100%;
  background: #0f1623;
}

/* ── Fonte padrão e sem scroll horizontal ── */
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow-x: hidden;
}

/* ── Herança de fonte em todos os controles ── */
input, select, button, textarea {
  font-family: inherit;
}

/* ── Borda roxa ao focar em campos ── */
input:focus, select:focus, textarea:focus {
  outline: none;
  border-color: #6366f1 !important;
}

/* ── Remove seta numérica nos inputs number ── */
input[type=number]::-webkit-inner-spin-button {
  -webkit-appearance: none;
}

/* ── Scrollbar fina e discreta ── */
::-webkit-scrollbar {
  width: 3px;
  height: 3px;
}
::-webkit-scrollbar-thumb {
  background: #2a3148;
  border-radius: 4px;
}

/* ── Cor de fundo das opções de select ── */
select option {
  background: #1a1f2e;
  color: #e8eaf6;
}

/* ── Animação de entrada dos cards (slide vindo de cima) ── */
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Animação de fade nas telas ── */
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

/* ── Classe aplicada em cada tela principal ── */
.screen {
  animation: fadeIn 0.2s ease;
}

  </style>
</head>
<body>

  <!-- Ponto de montagem do React -->
  <div id="root"></div>

  <!-- React (biblioteca principal) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <!-- ReactDOM (renderização no navegador) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

  <!-- Babel (transpila JSX para JS no navegador) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <!-- ========================================================
       app.js — Lógica principal (React + JSX)
       NOTA: type="text/babel" exige o código inline aqui.
       O arquivo app.js separado é a cópia de referência.
  ======================================================== -->
  <script type="text/babel">
/* ============================================================
   app.js — Lógica principal do Controle de Estoque (React/Babel)
   ============================================================
   ESTRUTURA DO ARQUIVO:
   1.  Imports do React (useState, useEffect, useCallback)
   2.  CONSTANTES       — categorias, unidades, motivos, UFs
   3.  STORAGE          — funções de salvar/carregar no localStorage
   4.  UTILS            — formatação de moeda, número, data
   5.  UTILS ADICIONAIS — sanitize, validateEmail, kpis, badge
   6.  ÍCONES           — componente Ic (SVG inline)
   7.  UI BASE          — estilos JS reutilizáveis (IS, SS)
   8.  COMPONENTES BASE — Toast, Modal, Campo, Confirm
   9.  DASHBOARD        — tela inicial com KPIs e alertas
   10. FORNECEDORES     — CRUD de fornecedores
   11. PRODUTOS         — CRUD de produtos + histórico de preços
   12. MOVIMENTAÇÕES    — entradas e saídas de estoque
   13. RELATÓRIOS       — gráficos e análises
   14. ALERTAS          — produtos abaixo do mínimo
   15. AUTH             — login, cadastro, hash de senha (PBKDF2)
   16. NOTAS FISCAIS    — emissão e cancelamento de NF-e (mock)
   17. APP              — componente raiz com navegação por abas
   ============================================================ */


const {useState,useEffect,useCallback}=React;

// ── CONSTANTES ───────────────────────────────────────────
const CATS=["Alimentos","Bebidas","Eletronicos","Vestuario","Limpeza","Higiene","Ferramentas","Outros"];
const CATS_LABEL=["Alimentos","Bebidas","Eletrônicos","Vestuário","Limpeza","Higiene","Ferramentas","Outros"];
const UNITS=["un","cx","kg","lt","mt","pc","bd"];
const MOTIVOS={
  entrada:["Compra","Devolucao de Cliente","Ajuste de Inventario","Transferencia"],
  saida:  ["Venda","Devolucao a Fornecedor","Ajuste de Inventario","Transferencia","Consumo Interno"]
};
const UFS=["AC","AL","AM","AP","BA","CE","DF","ES","GO","MA","MG","MS","MT","PA","PB","PE","PI","PR","RJ","RN","RO","RR","RS","SC","SE","SP","TO"];

// ── STORAGE ───────────────────────────────────────────────
const load=(k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch{return fb;}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

// ── UTILS ─────────────────────────────────────────────────
const fmt=v=>Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtN=v=>Number(v||0).toLocaleString("pt-BR");
const hoje=()=>new Date().toISOString().split("T")[0];


// ── UTILS ADICIONAIS (Auth + NF) ──────────────────────
function sanitize(s){
  if(typeof s!=="string")return String(s||"");
  return s.replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#x27;'}[c]));
}
function validateEmail(s){if(!s)return true;return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);}
function validateDate(s){if(!s)return true;return /^\d{4}-\d{2}-\d{2}$/.test(s)&&!isNaN(new Date(s));}

function kpis(produtos,movs){
  const ti=produtos.length;
  const vt=produtos.reduce((s,p)=>s+p.estoqueAtual*p.precoCusto,0);
  const am=produtos.filter(p=>p.estoqueAtual<=p.estoqueMinimo).length;
  const se=produtos.filter(p=>p.estoqueAtual===0).length;
  const te=movs.filter(m=>m.tipo==="entrada").reduce((s,m)=>s+m.quantidade,0);
  const ts=movs.filter(m=>m.tipo==="saida").reduce((s,m)=>s+m.quantidade,0);
  const gi=te>0?(ts/te*100).toFixed(1):"0.0";
  return{totalItens:ti,valorTotal:vt,abaixoMinimo:am,semEstoque:se,totalEntradas:te,totalSaidas:ts,giro:gi};
}

function badge(p){
  if(p.estoqueAtual===0)return{txt:"ZERADO",col:"#ef4444",bg:"#ef444420"};
  if(p.estoqueAtual<=p.estoqueMinimo)return{txt:"CRITICO",col:"#f59e0b",bg:"#f59e0b20"};
  if(p.estoqueMaximo>0&&p.estoqueAtual>=p.estoqueMaximo)return{txt:"MAXIMO",col:"#6366f1",bg:"#6366f120"};
  return{txt:"NORMAL",col:"#10b981",bg:"#10b98120"};
}

// ── ICONES ────────────────────────────────────────────────
function Ic({n,s=20,c="currentColor"}){
  const d={
    home:<><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></>,
    box:<><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></>,
    move:<><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 014-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 01-4 4H3"/></>,
    chart:<><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></>,
    alert:<><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>,
    truck:<><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></>,
    plus:<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
    search:<><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></>,
    edit:<><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></>,
    trash:<><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></>,
    back:<polyline points="15 18 9 12 15 6"/>,
    check:<polyline points="20 6 9 17 4 12"/>,
    close:<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
    up:<polyline points="18 15 12 9 6 15"/>,
    down:<polyline points="6 9 12 15 18 9"/>,
    tag:<><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></>,
    loc:<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></>,
    cal:<><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>,
    phone:<><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.01 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.16 6.16l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></>,
    mail:<><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></>,
    trend:<><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></>,
    install:<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
    info:<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
    filter:<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
  };
  return <svg width={s} height={s} fill="none" stroke={c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24">{d[n]||null}</svg>;
}

// ── UI BASE ───────────────────────────────────────────────
const IS={width:"100%",background:"#0f1623",border:"1.5px solid #2a3148",borderRadius:10,padding:"11px 14px",color:"#e8eaf6",fontSize:15,outline:"none",boxSizing:"border-box",fontFamily:"inherit"};
const SS={...IS,appearance:"none",WebkitAppearance:"none"};

function Toast({toasts}){
  return <div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,display:"flex",flexDirection:"column",gap:8,width:"calc(100% - 32px)",maxWidth:400,pointerEvents:"none"}}>
    {toasts.map(t=><div key={t.id} style={{background:t.type==="error"?"#ef4444":t.type==="warn"?"#f59e0b":"#10b981",color:"#fff",borderRadius:12,padding:"12px 16px",display:"flex",alignItems:"center",gap:8,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",animation:"slideDown .3s ease",fontSize:14,fontWeight:500}}>
      <Ic n={t.type==="error"?"close":t.type==="warn"?"alert":"check"} s={16}/>{t.msg}
    </div>)}
  </div>;
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#1a1f2e",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",paddingBottom:"calc(32px + env(safe-area-inset-bottom,0px))"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 14px",borderBottom:"1px solid #2a3148",position:"sticky",top:0,background:"#1a1f2e",zIndex:1}}>
        <h2 style={{fontSize:17,fontWeight:700,color:"#e8eaf6"}}>{title}</h2>
        <button onClick={onClose} style={{background:"#2a3148",border:"none",borderRadius:8,padding:6,cursor:"pointer",color:"#94a3b8",display:"flex"}}><Ic n="close" s={18}/></button>
      </div>
      <div style={{padding:"16px 20px 0"}}>{children}</div>
    </div>
  </div>;
}

function Campo({label,children,req}){
  return <div style={{marginBottom:14}}>
    <label style={{display:"block",fontSize:11,color:"#64748b",marginBottom:5,fontWeight:700,letterSpacing:"0.06em",textTransform:"uppercase"}}>
      {label}{req&&<span style={{color:"#ef4444"}}> *</span>}
    </label>
    {children}
  </div>;
}

function Confirm({open,onClose,onOk,msg}){
  return <Modal open={open} onClose={onClose} title="Confirmar">
    <p style={{color:"#94a3b8",fontSize:14,marginBottom:20}}>{msg||"Esta acao nao pode ser desfeita."}</p>
    <div style={{display:"flex",gap:10}}>
      <button onClick={onClose} style={{flex:1,background:"#2a3148",border:"none",borderRadius:12,padding:14,color:"#94a3b8",fontSize:15,cursor:"pointer",fontWeight:600}}>Cancelar</button>
      <button onClick={onOk} style={{flex:1,background:"#ef4444",border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:15,cursor:"pointer",fontWeight:700}}>Confirmar</button>
    </div>
  </Modal>;
}

// ── DASHBOARD ─────────────────────────────────────────────
function Dashboard({produtos,movs,fornecedores,onAlerta}){
  const k=kpis(produtos,movs);
  const alerts=produtos.filter(p=>p.estoqueAtual<=p.estoqueMinimo);
  const rec=[...movs].sort((a,b)=>b.id-a.id).slice(0,5);
  return <div className="screen" style={{padding:"0 16px 110px"}}>
    <div style={{padding:"20px 0 14px"}}>
      <p style={{fontSize:13,color:"#64748b"}}>Bem-vindo de volta!</p>
      <h1 style={{fontSize:22,fontWeight:800,color:"#e8eaf6",letterSpacing:"-.5px",marginTop:2}}>Controle de Estoque</h1>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      {[
        {l:"Valor em Estoque",v:fmt(k.valorTotal),n:"chart",col:"#6366f1",bg:"#1e1b4b"},
        {l:"Produtos",v:fmtN(k.totalItens),n:"box",col:"#0ea5e9",bg:"#0c1a2e"},
        {l:"Abaixo Minimo",v:k.abaixoMinimo,n:"alert",col:"#f59e0b",bg:"#1c1500",clk:true},
        {l:"Fornecedores",v:fornecedores.length,n:"truck",col:"#10b981",bg:"#0a1f12"},
      ].map((c,i)=><div key={i} onClick={()=>c.clk&&onAlerta()} style={{background:c.bg,borderRadius:16,padding:"16px 14px",border:`1.5px solid ${c.clk&&c.v>0?c.col+"40":"#2a3148"}`,cursor:c.clk?"pointer":"default"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <p style={{fontSize:10,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:6}}>{c.l}</p>
            <p style={{fontSize:19,fontWeight:800,color:c.col}}>{c.v}</p>
          </div>
          <div style={{background:c.col+"20",borderRadius:10,padding:8}}><Ic n={c.n} s={17} c={c.col}/></div>
        </div>
      </div>)}
    </div>

    <div style={{background:"#1a1f2e",borderRadius:16,padding:16,marginBottom:14,border:"1.5px solid #2a3148"}}>
      <p style={{fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Movimentacao Geral</p>
      <div style={{display:"flex",gap:12}}>
        {[{n:"up",l:"ENTRADAS",v:k.totalEntradas,col:"#10b981",bg:"#0a1f12",brd:"#10b98130"},{n:"down",l:"SAIDAS",v:k.totalSaidas,col:"#ef4444",bg:"#1c0a12",brd:"#ef444430"}].map((x,i)=>
          <div key={i} style={{flex:1,background:x.bg,borderRadius:12,padding:14,border:`1px solid ${x.brd}`}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}><Ic n={x.n} s={15} c={x.col}/><span style={{fontSize:11,color:x.col,fontWeight:700}}>{x.l}</span></div>
            <p style={{fontSize:22,fontWeight:800,color:x.col}}>{fmtN(x.v)}</p>
            <p style={{fontSize:11,color:"#64748b",marginTop:2}}>unidades</p>
          </div>
        )}
      </div>
    </div>

    {alerts.length>0&&<div style={{background:"#1c1500",borderRadius:16,padding:16,marginBottom:14,border:"1.5px solid #f59e0b30"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
        <Ic n="alert" s={15} c="#f59e0b"/>
        <p style={{fontSize:14,color:"#f59e0b",fontWeight:700}}>Atencao Necessaria</p>
        <button onClick={onAlerta} style={{marginLeft:"auto",background:"none",border:"none",color:"#f59e0b",fontSize:11,cursor:"pointer",fontWeight:600}}>Ver todos</button>
      </div>
      {alerts.slice(0,3).map(p=><div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #2a3148"}}>
        <div>
          <p style={{fontSize:13,color:"#e8eaf6",fontWeight:600}}>{p.nome}</p>
          <p style={{fontSize:11,color:"#64748b",marginTop:2}}>Min:{p.estoqueMinimo} / Atual:<span style={{color:p.estoqueAtual===0?"#ef4444":"#f59e0b",fontWeight:700}}> {p.estoqueAtual}</span></p>
        </div>
        <span style={{background:p.estoqueAtual===0?"#ef444420":"#f59e0b20",color:p.estoqueAtual===0?"#ef4444":"#f59e0b",borderRadius:8,padding:"4px 10px",fontSize:10,fontWeight:700}}>{p.estoqueAtual===0?"ZERADO":"BAIXO"}</span>
      </div>)}
    </div>}

    <div style={{background:"#1a1f2e",borderRadius:16,padding:16,border:"1.5px solid #2a3148"}}>
      <p style={{fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Ultimas Movimentacoes</p>
      {rec.length===0?<p style={{color:"#64748b",fontSize:13,textAlign:"center",padding:"16px 0"}}>Nenhuma movimentacao registrada</p>
      :rec.map(m=>{
        const p=produtos.find(x=>x.id===m.produtoId);
        return <div key={m.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid #2a3148"}}>
          <div style={{width:36,height:36,borderRadius:10,background:m.tipo==="entrada"?"#0a1f12":"#1c0a12",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ic n={m.tipo==="entrada"?"up":"down"} s={17} c={m.tipo==="entrada"?"#10b981":"#ef4444"}/>
          </div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:13,color:"#e8eaf6",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p?p.nome:"Produto removido"}</p>
            <p style={{fontSize:11,color:"#64748b",marginTop:2}}>{m.motivo} · {m.data}</p>
          </div>
          <p style={{fontSize:14,fontWeight:700,color:m.tipo==="entrada"?"#10b981":"#ef4444",flexShrink:0}}>{m.tipo==="entrada"?"+":"-"}{fmtN(m.quantidade)}</p>
        </div>;
      })}
    </div>
  </div>;
}

// ── FORNECEDORES ──────────────────────────────────────────
const FV={nome:"",cnpj:"",contato:"",telefone:"",email:"",endereco:"",cidade:"",uf:"",obs:""};

function Fornecedores({forns,setForns,produtos,hist,addT}){
  const [busca,setBusca]=useState("");
  const [modal,setModal]=useState(false);
  const [det,setDet]=useState(null);
  const [edit,setEdit]=useState(null);
  const [del,setDel]=useState(null);
  const [form,setForm]=useState(FV);
  const ff=(k,v)=>setForm(p=>({...p,[k]:v}));

  const list=forns.filter(f=>{
    const t=busca.toLowerCase();
    return !t||f.nome.toLowerCase().includes(t)||(f.cnpj||"").includes(t)||(f.cidade||"").toLowerCase().includes(t);
  });

  const novo=()=>{setForm(FV);setEdit(null);setModal(true);};
  const editar=f=>{setForm({...f,obs:f.obs||""});setEdit(f.id);setModal(true);};

  const salvar=()=>{
    if(!form.nome.trim()){addT("Nome obrigatorio","error");return;}
    if(forns.find(f=>f.nome.trim().toLowerCase()===form.nome.trim().toLowerCase()&&f.id!==edit)){addT("Fornecedor ja existe","error");return;}
    const obj={...form,nome:form.nome.trim()};
    if(edit){
      setForns(fs=>fs.map(f=>f.id===edit?{...obj,id:edit}:f));
      if(det&&det.id===edit)setDet({...obj,id:edit});
      addT("Fornecedor atualizado!","success");
    }else{
      setForns(fs=>[...fs,{...obj,id:Date.now()}]);
      addT("Fornecedor cadastrado!","success");
    }
    setModal(false);
  };

  const excluir=id=>{
    if(produtos.find(p=>p.fornecedorId===id)){addT("Fornecedor vinculado a produto(s). Desvincule antes.","error");setDel(null);return;}
    setForns(fs=>fs.filter(f=>f.id!==id));
    addT("Fornecedor removido!","success");
    setDel(null);
    if(det&&det.id===id)setDet(null);
  };

  if(det){
    const prods=produtos.filter(p=>p.fornecedorId===det.id);
    const hp=hist.filter(h=>h.fornecedorId===det.id).sort((a,b)=>b.data.localeCompare(a.data));
    const hpMap={};
    hp.forEach(h=>{if(!hpMap[h.produtoId])hpMap[h.produtoId]=[];hpMap[h.produtoId].push(h);});

    return <div className="screen" style={{padding:"0 16px 110px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"20px 0 16px"}}>
        <button onClick={()=>setDet(null)} style={{background:"#1a1f2e",border:"none",borderRadius:10,padding:8,cursor:"pointer",color:"#94a3b8",display:"flex"}}><Ic n="back" s={20}/></button>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:11,color:"#64748b"}}>{det.cnpj||"Sem CNPJ"}</p>
          <h2 style={{fontSize:17,fontWeight:800,color:"#e8eaf6",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginTop:1}}>{det.nome}</h2>
        </div>
        <button onClick={()=>editar(det)} style={{background:"#6366f120",border:"none",borderRadius:10,padding:8,cursor:"pointer",display:"flex"}}><Ic n="edit" s={18} c="#6366f1"/></button>
        <button onClick={()=>setDel(det.id)} style={{background:"#ef444420",border:"none",borderRadius:10,padding:8,cursor:"pointer",display:"flex"}}><Ic n="trash" s={18} c="#ef4444"/></button>
      </div>

      <div style={{background:"#1a1f2e",borderRadius:16,padding:16,marginBottom:12,border:"1.5px solid #2a3148"}}>
        <p style={{fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Dados de Contato</p>
        {[
          {l:"Contato",v:det.contato||"—",n:"info"},
          {l:"Telefone",v:det.telefone||"—",n:"phone"},
          {l:"E-mail",v:det.email||"—",n:"mail"},
          {l:"Endereco",v:det.endereco||"—",n:"loc"},
          {l:"Cidade/UF",v:det.cidade?(det.cidade+(det.uf?" - "+det.uf:"")):"—",n:"loc"},
        ].map((x,i)=><div key={i} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"9px 0",borderBottom:"1px solid #2a3148"}}>
          <div style={{marginTop:1}}><Ic n={x.n} s={14} c="#64748b"/></div>
          <span style={{fontSize:12,color:"#64748b",width:80,flexShrink:0}}>{x.l}</span>
          <span style={{fontSize:13,color:"#e8eaf6",fontWeight:500,flex:1,wordBreak:"break-all"}}>{x.v}</span>
        </div>)}
        {det.obs&&<div style={{marginTop:10,background:"#0f1623",borderRadius:10,padding:"10px 12px"}}>
          <p style={{fontSize:11,color:"#64748b",marginBottom:4,fontWeight:700}}>OBSERVACOES</p>
          <p style={{fontSize:13,color:"#94a3b8"}}>{det.obs}</p>
        </div>}
      </div>

      <div style={{background:"#1a1f2e",borderRadius:16,padding:16,marginBottom:12,border:"1.5px solid #2a3148"}}>
        <p style={{fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Produtos Fornecidos ({prods.length})</p>
        {prods.length===0?<p style={{color:"#64748b",fontSize:13,textAlign:"center",padding:"10px 0"}}>Nenhum produto vinculado</p>
        :prods.map(p=>{const b=badge(p);return <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #2a3148"}}>
          <div style={{width:36,height:36,borderRadius:10,background:"#0f1623",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1.5px solid ${b.bg}`}}><Ic n="box" s={18} c={b.col}/></div>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:13,color:"#e8eaf6",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.nome}</p>
            <p style={{fontSize:11,color:"#64748b",marginTop:1}}>{p.sku} · Est: <b style={{color:b.col}}>{p.estoqueAtual}</b> {p.unidade}</p>
          </div>
          <div style={{textAlign:"right"}}>
            <p style={{fontSize:13,fontWeight:700,color:"#e8eaf6"}}>{fmt(p.precoCusto)}</p>
            <p style={{fontSize:10,color:"#64748b"}}>custo/un</p>
          </div>
        </div>;})}
      </div>

      <div style={{background:"#1a1f2e",borderRadius:16,padding:16,border:"1.5px solid #2a3148"}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <Ic n="trend" s={14} c="#6366f1"/>
          <p style={{fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Historico de Precos por Produto</p>
        </div>
        {Object.keys(hpMap).length===0?<p style={{color:"#64748b",fontSize:13,textAlign:"center",padding:"10px 0"}}>Nenhum historico registrado</p>
        :Object.entries(hpMap).map(([pid,regs])=>{
          const pr=produtos.find(p=>p.id===parseInt(pid));
          if(!pr)return null;
          const ord=[...regs].sort((a,b)=>a.data.localeCompare(b.data));
          const ini=ord[0].preco,fim=ord[ord.length-1].preco;
          const vp=ini>0?((fim-ini)/ini*100).toFixed(1):0;
          return <div key={pid} style={{marginBottom:16,paddingBottom:16,borderBottom:"1px solid #2a3148"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div>
                <p style={{fontSize:13,color:"#e8eaf6",fontWeight:700}}>{pr.nome}</p>
                <p style={{fontSize:11,color:"#64748b",marginTop:1}}>{regs.length} registro{regs.length!==1?"s":""}</p>
              </div>
              <div style={{textAlign:"right"}}>
                <p style={{fontSize:13,fontWeight:800,color:fim>ini?"#ef4444":"#10b981"}}>{fim>ini?"↑":"↓"} {Math.abs(vp)}%</p>
                <p style={{fontSize:10,color:"#64748b"}}>variacao total</p>
              </div>
            </div>
            {regs.map((r,i)=>{
              const ant=i<regs.length-1?regs[i+1].preco:null;
              const d=ant?r.preco-ant:0;
              return <div key={r.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid #1a1f2e"}}>
                <div style={{width:7,height:7,borderRadius:"50%",background:d>0?"#ef4444":d<0?"#10b981":"#64748b",flexShrink:0}}/>
                <span style={{fontSize:12,color:"#64748b",width:78,flexShrink:0}}>{r.data}</span>
                <span style={{fontSize:13,fontWeight:700,color:"#e8eaf6",flex:1}}>{fmt(r.preco)}</span>
                {ant&&<span style={{fontSize:11,fontWeight:600,color:d>0?"#ef4444":"#10b981",flexShrink:0}}>{d>0?"+":""}{fmt(d)}</span>}
                {r.obs&&<span style={{fontSize:10,color:"#64748b",fontStyle:"italic",maxWidth:64,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.obs}</span>}
              </div>;
            })}
          </div>;
        })}
      </div>

      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"Editar Fornecedor":"Novo Fornecedor"}>
        <FormForn form={form} ff={ff} ok={salvar} cancel={()=>setModal(false)}/>
      </Modal>
      <Confirm open={!!del} onClose={()=>setDel(null)} onOk={()=>excluir(del)} msg="Remover este fornecedor? Certifique-se de que nenhum produto esteja vinculado."/>
    </div>;
  }

  return <div className="screen" style={{padding:"0 16px 110px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 0 16px"}}>
      <h1 style={{fontSize:22,fontWeight:800,color:"#e8eaf6"}}>Fornecedores</h1>
      <button onClick={novo} style={{background:"#10b981",border:"none",borderRadius:12,padding:"10px 16px",color:"#fff",display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontWeight:700,fontSize:14}}>
        <Ic n="plus" s={15} c="#fff"/> Novo
      </button>
    </div>
    <div style={{position:"relative",marginBottom:16}}>
      <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Ic n="search" s={16} c="#64748b"/></div>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar nome, CNPJ, cidade..." style={{...IS,paddingLeft:38,borderRadius:12}}/>
    </div>
    <p style={{fontSize:11,color:"#64748b",marginBottom:12}}>{list.length} fornecedor{list.length!==1?"es":""}</p>
    {list.length===0?<div style={{textAlign:"center",padding:"48px 0"}}>
      <Ic n="truck" s={48} c="#2a3148"/>
      <p style={{color:"#64748b",marginTop:12,marginBottom:12}}>Nenhum fornecedor cadastrado</p>
      <button onClick={novo} style={{background:"#10b981",border:"none",borderRadius:12,padding:"12px 24px",color:"#fff",cursor:"pointer",fontWeight:700}}>Cadastrar Fornecedor</button>
    </div>
    :list.map(f=>{
      const np=produtos.filter(p=>p.fornecedorId===f.id).length;
      return <div key={f.id} onClick={()=>setDet(f)} style={{background:"#1a1f2e",borderRadius:16,padding:14,marginBottom:10,border:"1.5px solid #2a3148",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:44,height:44,borderRadius:12,background:"#0a1f12",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:"1.5px solid #10b98130"}}><Ic n="truck" s={22} c="#10b981"/></div>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:14,fontWeight:700,color:"#e8eaf6",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.nome}</p>
          <p style={{fontSize:11,color:"#64748b",marginTop:2}}>{f.cnpj||"Sem CNPJ"}{f.cidade?" · "+f.cidade+(f.uf?"/"+f.uf:""):""}</p>
          <p style={{fontSize:12,color:"#94a3b8",marginTop:4}}>{np} produto{np!==1?"s":""} vinculado{np!==1?"s":""}</p>
        </div>
        <Ic n="info" s={16} c="#2a3148"/>
      </div>;
    })}
    <Modal open={modal} onClose={()=>setModal(false)} title={edit?"Editar Fornecedor":"Novo Fornecedor"}>
      <FormForn form={form} ff={ff} ok={salvar} cancel={()=>setModal(false)}/>
    </Modal>
    <Confirm open={!!del} onClose={()=>setDel(null)} onOk={()=>excluir(del)} msg="Remover este fornecedor?"/>
  </div>;
}

function FormForn({form,ff,ok,cancel}){
  return <div>
    <Campo label="Nome / Razao Social" req><input value={form.nome} onChange={e=>ff("nome",e.target.value)} placeholder="Ex: TechDistrib LTDA" style={IS}/></Campo>
    <Campo label="CNPJ"><input value={form.cnpj||""} onChange={e=>ff("cnpj",e.target.value)} placeholder="00.000.000/0001-00" style={IS}/></Campo>
    <Campo label="Nome do Contato"><input value={form.contato||""} onChange={e=>ff("contato",e.target.value)} placeholder="Ex: Joao Silva" style={IS}/></Campo>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo label="Telefone"><input value={form.telefone||""} onChange={e=>ff("telefone",e.target.value)} placeholder="(00) 90000-0000" style={IS}/></Campo>
      <Campo label="E-mail"><input type="email" value={form.email||""} onChange={e=>ff("email",e.target.value)} placeholder="email@empresa.com" style={IS}/></Campo>
    </div>
    <Campo label="Endereco"><input value={form.endereco||""} onChange={e=>ff("endereco",e.target.value)} placeholder="Rua, numero, bairro" style={IS}/></Campo>
    <div style={{display:"grid",gridTemplateColumns:"1fr 72px",gap:10}}>
      <Campo label="Cidade"><input value={form.cidade||""} onChange={e=>ff("cidade",e.target.value)} placeholder="Cidade" style={IS}/></Campo>
      <Campo label="UF"><select value={form.uf||""} onChange={e=>ff("uf",e.target.value)} style={SS}><option value="">UF</option>{UFS.map(u=><option key={u} value={u}>{u}</option>)}</select></Campo>
    </div>
    <Campo label="Observacoes"><textarea value={form.obs||""} onChange={e=>ff("obs",e.target.value)} placeholder="Prazo de pagamento, condicoes especiais..." rows={3} style={{...IS,resize:"none",lineHeight:1.5}}/></Campo>
    <div style={{display:"flex",gap:10,marginTop:8}}>
      <button onClick={cancel} style={{flex:1,background:"#2a3148",border:"none",borderRadius:12,padding:14,color:"#94a3b8",fontSize:15,cursor:"pointer",fontWeight:600}}>Cancelar</button>
      <button onClick={ok} style={{flex:1,background:"#10b981",border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:15,cursor:"pointer",fontWeight:700}}>Salvar</button>
    </div>
  </div>;
}

// ── PRODUTOS ──────────────────────────────────────────────
const PV={sku:"",nome:"",categoria:"",localizacao:"",precoCusto:"",precoVenda:"",fornecedorId:"",estoqueAtual:"0",estoqueMinimo:"",estoqueMaximo:"",leadTime:"",validade:"",unidade:"un"};

function Produtos({produtos,setProd,movs,forns,hist,setHist,addT}){
  const [busca,setBusca]=useState("");
  const [cat,setCat]=useState("");
  const [modal,setModal]=useState(false);
  const [det,setDet]=useState(null);
  const [edit,setEdit]=useState(null);
  const [del,setDel]=useState(null);
  const [form,setForm]=useState(PV);
  const [mPreco,setMPreco]=useState(false);
  const [fp,setFp]=useState({preco:"",data:hoje(),obs:""});

  const list=produtos.filter(p=>{
    const t=busca.toLowerCase();
    const fn=forns.find(f=>f.id===p.fornecedorId);
    return(!t||p.nome.toLowerCase().includes(t)||p.sku.toLowerCase().includes(t)||(fn?fn.nome.toLowerCase().includes(t):false))&&(!cat||p.categoria===cat);
  });

  const novo=()=>{setForm(PV);setEdit(null);setModal(true);};
  const editar=p=>{setForm({...p,fornecedorId:p.fornecedorId||""});setEdit(p.id);setModal(true);};

  const salvar=()=>{
    if(!form.sku||!form.nome||!form.categoria){addT("Preencha os campos obrigatorios!","error");return;}
    if(produtos.find(p=>p.sku===form.sku&&p.id!==edit)){addT("SKU ja cadastrado!","error");return;}
    const fid=form.fornecedorId?parseInt(form.fornecedorId):null;
    const obj={...form,precoCusto:parseFloat(form.precoCusto)||0,precoVenda:parseFloat(form.precoVenda)||0,
      estoqueAtual:parseInt(form.estoqueAtual)||0,estoqueMinimo:parseInt(form.estoqueMinimo)||0,
      estoqueMaximo:parseInt(form.estoqueMaximo)||0,leadTime:parseInt(form.leadTime)||0,fornecedorId:fid};
    if(edit){
      const ant=produtos.find(p=>p.id===edit);
      if(ant&&ant.precoCusto!==obj.precoCusto&&fid){
        setHist(hs=>[{id:Date.now(),produtoId:edit,fornecedorId:fid,preco:obj.precoCusto,data:hoje(),obs:"Atualizacao de cadastro"},...hs]);
      }
      setProd(ps=>ps.map(p=>p.id===edit?{...obj,id:edit}:p));
      if(det&&det.id===edit)setDet({...obj,id:edit});
      addT("Produto atualizado!","success");
    }else{
      const nid=Date.now();
      setProd(ps=>[...ps,{...obj,id:nid}]);
      if(obj.precoCusto>0&&fid)setHist(hs=>[{id:nid+1,produtoId:nid,fornecedorId:fid,preco:obj.precoCusto,data:hoje(),obs:"Cadastro inicial"},...hs]);
      addT("Produto cadastrado!","success");
    }
    setModal(false);
  };

  const excluir=id=>{
    setProd(ps=>ps.filter(p=>p.id!==id));
    setHist(hs=>hs.filter(h=>h.produtoId!==id));
    addT("Produto removido!","success");
    setDel(null);if(det&&det.id===id)setDet(null);
  };

  const regPreco=()=>{
    if(!fp.preco){addT("Informe o preco!","error");return;}
    if(!det.fornecedorId){addT("Vincule um fornecedor ao produto primeiro!","error");return;}
    const nv=parseFloat(fp.preco);
    setHist(hs=>[{id:Date.now(),produtoId:det.id,fornecedorId:det.fornecedorId,preco:nv,data:fp.data,obs:fp.obs},...hs]);
    setProd(ps=>ps.map(p=>p.id===det.id?{...p,precoCusto:nv}:p));
    setDet(d=>({...d,precoCusto:nv}));
    addT("Preco registrado!","success");
    setMPreco(false);setFp({preco:"",data:hoje(),obs:""});
  };

  if(det){
    const b=badge(det);
    const mg=det.precoVenda>0?((det.precoVenda-det.precoCusto)/det.precoVenda*100).toFixed(1):0;
    const hm=movs.filter(m=>m.produtoId===det.id).sort((a,b)=>b.id-a.id);
    const fn=forns.find(f=>f.id===det.fornecedorId);
    const hp=hist.filter(h=>h.produtoId===det.id).sort((a,b)=>b.data.localeCompare(a.data));
    return <div className="screen" style={{padding:"0 16px 110px"}}>
      <div style={{display:"flex",alignItems:"center",gap:12,padding:"20px 0 16px"}}>
        <button onClick={()=>setDet(null)} style={{background:"#1a1f2e",border:"none",borderRadius:10,padding:8,cursor:"pointer",color:"#94a3b8",display:"flex"}}><Ic n="back" s={20}/></button>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:11,color:"#64748b"}}>{det.sku}</p>
          <h2 style={{fontSize:17,fontWeight:800,color:"#e8eaf6",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",marginTop:1}}>{det.nome}</h2>
        </div>
        <button onClick={()=>editar(det)} style={{background:"#6366f120",border:"none",borderRadius:10,padding:8,cursor:"pointer",display:"flex"}}><Ic n="edit" s={18} c="#6366f1"/></button>
        <button onClick={()=>setDel(det.id)} style={{background:"#ef444420",border:"none",borderRadius:10,padding:8,cursor:"pointer",display:"flex"}}><Ic n="trash" s={18} c="#ef4444"/></button>
      </div>

      <div style={{background:"#1a1f2e",borderRadius:16,padding:16,marginBottom:12,border:"1.5px solid #2a3148"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <span style={{fontSize:13,color:"#64748b"}}>Status do Estoque</span>
          <span style={{background:b.bg,color:b.col,borderRadius:8,padding:"4px 12px",fontSize:11,fontWeight:700}}>{b.txt}</span>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
          {[{l:"Atual",v:det.estoqueAtual,col:b.col},{l:"Minimo",v:det.estoqueMinimo,col:"#f59e0b"},{l:"Maximo",v:det.estoqueMaximo,col:"#6366f1"}].map((x,i)=>
            <div key={i} style={{background:"#0f1623",borderRadius:12,padding:"12px 8px",textAlign:"center"}}>
              <p style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:".05em",marginBottom:4,fontWeight:700}}>{x.l}</p>
              <p style={{fontSize:20,fontWeight:800,color:x.col}}>{x.v}</p>
            </div>
          )}
        </div>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        {[{l:"Custo Unit.",v:fmt(det.precoCusto),col:"#94a3b8"},{l:"Preco Venda",v:fmt(det.precoVenda),col:"#10b981"},{l:"Margem",v:mg+"%",col:"#6366f1"},{l:"Lead Time",v:det.leadTime+" dias",col:"#0ea5e9"}].map((x,i)=>
          <div key={i} style={{background:"#1a1f2e",borderRadius:14,padding:"14px 12px",border:"1.5px solid #2a3148"}}>
            <p style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:".05em",marginBottom:4,fontWeight:700}}>{x.l}</p>
            <p style={{fontSize:16,fontWeight:700,color:x.col}}>{x.v}</p>
          </div>
        )}
      </div>

      {fn&&<div style={{background:"#0a1f12",borderRadius:16,padding:16,marginBottom:12,border:"1.5px solid #10b98130"}}>
        <p style={{fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>Fornecedor</p>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:40,height:40,borderRadius:10,background:"#10b98120",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n="truck" s={20} c="#10b981"/></div>
          <div style={{flex:1}}>
            <p style={{fontSize:14,color:"#e8eaf6",fontWeight:700}}>{fn.nome}</p>
            {fn.telefone&&<p style={{fontSize:11,color:"#64748b",marginTop:2}}>{fn.telefone}</p>}
            {fn.contato&&<p style={{fontSize:11,color:"#64748b"}}>{fn.contato}</p>}
          </div>
        </div>
      </div>}

      <div style={{background:"#1a1f2e",borderRadius:16,padding:16,marginBottom:12,border:"1.5px solid #2a3148"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><Ic n="trend" s={14} c="#6366f1"/><p style={{fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Historico de Precos</p></div>
          <button onClick={()=>setMPreco(true)} style={{background:"#6366f120",border:"none",borderRadius:8,padding:"6px 10px",color:"#6366f1",cursor:"pointer",fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:4}}>
            <Ic n="plus" s={12} c="#6366f1"/> Registrar
          </button>
        </div>
        {hp.length===0?<p style={{color:"#64748b",fontSize:13,textAlign:"center",padding:"10px 0"}}>Nenhum historico registrado</p>
        :hp.map((r,i)=>{
          const pr=hp[i+1];const d=pr?r.preco-pr.preco:0;
          return <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #2a3148"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:d>0?"#ef4444":d<0?"#10b981":"#64748b",flexShrink:0}}/>
            <span style={{fontSize:12,color:"#64748b",width:82,flexShrink:0}}>{r.data}</span>
            <span style={{fontSize:14,fontWeight:700,color:"#e8eaf6",flex:1}}>{fmt(r.preco)}</span>
            {pr&&<span style={{fontSize:11,fontWeight:600,color:d>0?"#ef4444":"#10b981",flexShrink:0}}>{d>0?"▲":"▼"} {fmt(Math.abs(d))}</span>}
            {r.obs&&<span style={{fontSize:10,color:"#64748b",fontStyle:"italic",maxWidth:64,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.obs}</span>}
          </div>;
        })}
      </div>

      <div style={{background:"#1a1f2e",borderRadius:16,padding:16,marginBottom:12,border:"1.5px solid #2a3148"}}>
        <p style={{fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Informacoes Cadastrais</p>
        {[{l:"Categoria",v:det.categoria,n:"filter"},{l:"Localizacao",v:det.localizacao||"—",n:"loc"},{l:"Unidade",v:det.unidade||"un",n:"box"},...(det.validade?[{l:"Validade",v:det.validade,n:"cal"}]:[])].map((x,i)=>
          <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #2a3148"}}>
            <Ic n={x.n} s={14} c="#64748b"/>
            <span style={{fontSize:12,color:"#64748b",width:88,flexShrink:0}}>{x.l}</span>
            <span style={{fontSize:13,color:"#e8eaf6",fontWeight:500}}>{x.v}</span>
          </div>
        )}
      </div>

      <div style={{background:"#1a1f2e",borderRadius:16,padding:16,border:"1.5px solid #2a3148"}}>
        <p style={{fontSize:11,color:"#64748b",fontWeight:700,textTransform:"uppercase",letterSpacing:".06em",marginBottom:12}}>Historico de Movimentacoes</p>
        {hm.length===0?<p style={{color:"#64748b",fontSize:13,textAlign:"center",padding:"12px 0"}}>Nenhuma movimentacao</p>
        :hm.map(m=><div key={m.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #2a3148"}}>
          <div style={{width:30,height:30,borderRadius:8,background:m.tipo==="entrada"?"#0a1f12":"#1c0a12",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <Ic n={m.tipo==="entrada"?"up":"down"} s={14} c={m.tipo==="entrada"?"#10b981":"#ef4444"}/>
          </div>
          <div style={{flex:1}}>
            <p style={{fontSize:12,color:"#e8eaf6",fontWeight:600}}>{m.motivo}</p>
            <p style={{fontSize:11,color:"#64748b",marginTop:1}}>{m.data}{m.observacao?" · "+m.observacao:""}</p>
          </div>
          <span style={{fontSize:14,fontWeight:700,color:m.tipo==="entrada"?"#10b981":"#ef4444",flexShrink:0}}>{m.tipo==="entrada"?"+":"-"}{fmtN(m.quantidade)}</span>
        </div>)}
      </div>

      <Modal open={modal} onClose={()=>setModal(false)} title={edit?"Editar Produto":"Novo Produto"}>
        <FormProd form={form} setForm={setForm} forns={forns} ok={salvar} cancel={()=>setModal(false)}/>
      </Modal>
      <Modal open={mPreco} onClose={()=>setMPreco(false)} title="Registrar Novo Preco">
        <Campo label="Preco de Custo (R$)" req><input type="number" min="0" step="0.01" value={fp.preco} onChange={e=>setFp(p=>({...p,preco:e.target.value}))} placeholder="0,00" style={IS}/></Campo>
        <Campo label="Data" req><input type="date" value={fp.data} onChange={e=>setFp(p=>({...p,data:e.target.value}))} style={IS}/></Campo>
        <Campo label="Observacao"><input value={fp.obs} onChange={e=>setFp(p=>({...p,obs:e.target.value}))} placeholder="Ex: Reajuste anual, NF..." style={IS}/></Campo>
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button onClick={()=>setMPreco(false)} style={{flex:1,background:"#2a3148",border:"none",borderRadius:12,padding:14,color:"#94a3b8",fontSize:15,cursor:"pointer",fontWeight:600}}>Cancelar</button>
          <button onClick={regPreco} style={{flex:1,background:"#6366f1",border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:15,cursor:"pointer",fontWeight:700}}>Registrar</button>
        </div>
      </Modal>
      <Confirm open={!!del} onClose={()=>setDel(null)} onOk={()=>excluir(del)}/>
    </div>;
  }

  return <div className="screen" style={{padding:"0 16px 110px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 0 16px"}}>
      <h1 style={{fontSize:22,fontWeight:800,color:"#e8eaf6"}}>Produtos</h1>
      <button onClick={novo} style={{background:"#6366f1",border:"none",borderRadius:12,padding:"10px 16px",color:"#fff",display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontWeight:700,fontSize:14}}><Ic n="plus" s={15} c="#fff"/> Novo</button>
    </div>
    <div style={{position:"relative",marginBottom:12}}>
      <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Ic n="search" s={16} c="#64748b"/></div>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar nome, SKU, fornecedor..." style={{...IS,paddingLeft:38,borderRadius:12}}/>
    </div>
    <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:10,marginBottom:4}}>
      {["Todos",...CATS_LABEL].map((c,i)=>{
        const v=i===0?"":CATS[i-1];const active=i===0?!cat:cat===v;
        return <button key={c} onClick={()=>setCat(active&&i!==0?"":v)} style={{background:active?"#6366f1":"#1a1f2e",border:"none",borderRadius:20,padding:"7px 13px",color:active?"#fff":"#94a3b8",cursor:"pointer",fontSize:12,fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>{c}</button>;
      })}
    </div>
    <p style={{fontSize:11,color:"#64748b",margin:"6px 0 10px"}}>{list.length} produto{list.length!==1?"s":""}</p>
    {list.length===0?<div style={{textAlign:"center",padding:"48px 0"}}>
      <Ic n="box" s={48} c="#2a3148"/>
      <p style={{color:"#64748b",marginTop:12,marginBottom:12}}>Nenhum produto encontrado</p>
      <button onClick={novo} style={{background:"#6366f1",border:"none",borderRadius:12,padding:"12px 24px",color:"#fff",cursor:"pointer",fontWeight:700}}>Cadastrar Produto</button>
    </div>
    :list.map(p=>{
      const b=badge(p);const fn=forns.find(f=>f.id===p.fornecedorId);
      return <div key={p.id} onClick={()=>setDet(p)} style={{background:"#1a1f2e",borderRadius:16,padding:14,marginBottom:10,border:"1.5px solid #2a3148",cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:44,height:44,borderRadius:12,background:"#0f1623",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,border:`1.5px solid ${b.bg}`}}><Ic n="box" s={22} c={b.col}/></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <p style={{fontSize:14,fontWeight:700,color:"#e8eaf6",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"62%"}}>{p.nome}</p>
            <span style={{background:b.bg,color:b.col,borderRadius:6,padding:"2px 8px",fontSize:10,fontWeight:700,flexShrink:0}}>{b.txt}</span>
          </div>
          <p style={{fontSize:11,color:"#64748b",marginTop:2}}>{p.sku} · {p.categoria}</p>
          <div style={{display:"flex",gap:10,marginTop:5,flexWrap:"wrap"}}>
            <span style={{fontSize:12,color:"#94a3b8"}}>Est: <b style={{color:b.col}}>{p.estoqueAtual}</b> {p.unidade}</span>
            <span style={{fontSize:12,color:"#94a3b8"}}>{fmt(p.precoVenda)}</span>
            {fn&&<span style={{fontSize:11,color:"#10b981",fontWeight:600}}>↑ {fn.nome.split(" ")[0]}</span>}
          </div>
        </div>
      </div>;
    })}
    <Modal open={modal} onClose={()=>setModal(false)} title={edit?"Editar Produto":"Novo Produto"}>
      <FormProd form={form} setForm={setForm} forns={forns} ok={salvar} cancel={()=>setModal(false)}/>
    </Modal>
    <Confirm open={!!del} onClose={()=>setDel(null)} onOk={()=>excluir(del)}/>
  </div>;
}

function FormProd({form,setForm,forns,ok,cancel}){
  const f=(k,v)=>setForm(p=>({...p,[k]:v}));
  return <div>
    <Campo label="SKU / Codigo" req><input value={form.sku} onChange={e=>f("sku",e.target.value.toUpperCase())} placeholder="Ex: ELE-001" style={IS}/></Campo>
    <Campo label="Nome do Produto" req><input value={form.nome} onChange={e=>f("nome",e.target.value)} placeholder="Ex: Smartphone Samsung A54" style={IS}/></Campo>
    <Campo label="Categoria" req><select value={form.categoria} onChange={e=>f("categoria",e.target.value)} style={SS}><option value="">Selecionar...</option>{CATS.map((c,i)=><option key={c} value={c}>{CATS_LABEL[i]}</option>)}</select></Campo>
    <Campo label="Fornecedor"><select value={form.fornecedorId||""} onChange={e=>f("fornecedorId",e.target.value)} style={SS}><option value="">Sem fornecedor</option>{forns.map(fn=><option key={fn.id} value={fn.id}>{fn.nome}</option>)}</select></Campo>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo label="Preco Custo"><input type="number" min="0" step="0.01" value={form.precoCusto} onChange={e=>f("precoCusto",e.target.value)} placeholder="0,00" style={IS}/></Campo>
      <Campo label="Preco Venda"><input type="number" min="0" step="0.01" value={form.precoVenda} onChange={e=>f("precoVenda",e.target.value)} placeholder="0,00" style={IS}/></Campo>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}>
      <Campo label="Est. Min."><input type="number" min="0" value={form.estoqueMinimo} onChange={e=>f("estoqueMinimo",e.target.value)} placeholder="0" style={IS}/></Campo>
      <Campo label="Est. Max."><input type="number" min="0" value={form.estoqueMaximo} onChange={e=>f("estoqueMaximo",e.target.value)} placeholder="0" style={IS}/></Campo>
      <Campo label="Lead Time"><input type="number" min="0" value={form.leadTime} onChange={e=>f("leadTime",e.target.value)} placeholder="dias" style={IS}/></Campo>
    </div>
    <Campo label="Localizacao"><input value={form.localizacao} onChange={e=>f("localizacao",e.target.value.toUpperCase())} placeholder="Ex: R01-C02-N1" style={IS}/></Campo>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo label="Unidade"><select value={form.unidade} onChange={e=>f("unidade",e.target.value)} style={SS}>{UNITS.map(u=><option key={u} value={u}>{u}</option>)}</select></Campo>
      <Campo label="Validade"><input type="date" value={form.validade||""} onChange={e=>f("validade",e.target.value)} style={IS}/></Campo>
    </div>
    <div style={{display:"flex",gap:10,marginTop:8}}>
      <button onClick={cancel} style={{flex:1,background:"#2a3148",border:"none",borderRadius:12,padding:14,color:"#94a3b8",fontSize:15,cursor:"pointer",fontWeight:600}}>Cancelar</button>
      <button onClick={ok} style={{flex:1,background:"#6366f1",border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:15,cursor:"pointer",fontWeight:700}}>Salvar</button>
    </div>
  </div>;
}

// ── MOVIMENTACOES ─────────────────────────────────────────
const MV={produtoId:"",tipo:"entrada",quantidade:"",motivo:"",data:hoje(),observacao:""};

function Movimentacoes({produtos,movs,setMovs,setProd,forns,addT}){
  const [modal,setModal]=useState(false);
  const [ftipo,setFtipo]=useState("");
  const [busca,setBusca]=useState("");
  const [form,setForm]=useState(MV);
  const ff=(k,v)=>setForm(p=>({...p,[k]:v,...(k==="tipo"?{motivo:""}:{})}));

  const salvar=()=>{
    if(!form.produtoId||!form.quantidade||!form.motivo){addT("Preencha todos os campos!","error");return;}
    const qtd=parseInt(form.quantidade);
    if(isNaN(qtd)||qtd<=0){addT("Quantidade invalida!","error");return;}
    const prod=produtos.find(p=>p.id===parseInt(form.produtoId));
    if(!prod){addT("Produto nao encontrado!","error");return;}
    if(form.tipo==="saida"&&prod.estoqueAtual<qtd){addT("Estoque insuficiente! Disponivel: "+prod.estoqueAtual,"error");return;}
    const nv={id:Date.now(),produtoId:parseInt(form.produtoId),tipo:form.tipo,quantidade:qtd,motivo:form.motivo,data:form.data,observacao:form.observacao};
    setMovs(ms=>[nv,...ms]);
    setProd(ps=>ps.map(p=>p.id===prod.id?{...p,estoqueAtual:form.tipo==="entrada"?p.estoqueAtual+qtd:p.estoqueAtual-qtd}:p));
    addT((form.tipo==="entrada"?"Entrada":"Saida")+" registrada!","success");
    setModal(false);setForm(MV);
  };

  const list=[...movs].filter(m=>{
    const p=produtos.find(x=>x.id===m.produtoId);const t=busca.toLowerCase();
    return(!t||(p&&(p.nome.toLowerCase().includes(t)||p.sku.toLowerCase().includes(t))))&&(!ftipo||m.tipo===ftipo);
  }).sort((a,b)=>b.id-a.id);

  const ps=produtos.find(p=>p.id===parseInt(form.produtoId));
  const fs=ps?forns.find(f=>f.id===ps.fornecedorId):null;

  return <div className="screen" style={{padding:"0 16px 110px"}}>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"20px 0 16px"}}>
      <h1 style={{fontSize:22,fontWeight:800,color:"#e8eaf6"}}>Movimentacoes</h1>
      <button onClick={()=>setModal(true)} style={{background:"#10b981",border:"none",borderRadius:12,padding:"10px 16px",color:"#fff",display:"flex",alignItems:"center",gap:6,cursor:"pointer",fontWeight:700,fontSize:14}}><Ic n="plus" s={15} c="#fff"/> Registrar</button>
    </div>
    <div style={{position:"relative",marginBottom:12}}>
      <div style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",pointerEvents:"none"}}><Ic n="search" s={16} c="#64748b"/></div>
      <input value={busca} onChange={e=>setBusca(e.target.value)} placeholder="Buscar produto..." style={{...IS,paddingLeft:38,borderRadius:12}}/>
    </div>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      {[{v:"",l:"Todos"},{v:"entrada",l:"Entradas"},{v:"saida",l:"Saidas"}].map(x=>{
        const a=ftipo===x.v;const cor=x.v==="entrada"?"#10b981":x.v==="saida"?"#ef4444":"#6366f1";
        return <button key={x.v} onClick={()=>setFtipo(x.v)} style={{flex:1,background:a?cor:"#1a1f2e",border:"none",borderRadius:10,padding:10,color:a?"#fff":"#94a3b8",cursor:"pointer",fontSize:13,fontWeight:600}}>{x.l}</button>;
      })}
    </div>
    {list.length===0?<div style={{textAlign:"center",padding:"48px 0"}}><Ic n="move" s={48} c="#2a3148"/><p style={{color:"#64748b",marginTop:12}}>Nenhuma movimentacao</p></div>
    :list.map(m=>{
      const p=produtos.find(x=>x.id===m.produtoId);const fn=p?forns.find(f=>f.id===p.fornecedorId):null;
      return <div key={m.id} style={{background:"#1a1f2e",borderRadius:16,padding:14,marginBottom:10,border:"1.5px solid #2a3148",display:"flex",alignItems:"center",gap:12}}>
        <div style={{width:44,height:44,borderRadius:12,background:m.tipo==="entrada"?"#0a1f12":"#1c0a12",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ic n={m.tipo==="entrada"?"up":"down"} s={22} c={m.tipo==="entrada"?"#10b981":"#ef4444"}/></div>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontSize:14,fontWeight:700,color:"#e8eaf6",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p?p.nome:"Produto removido"}</p>
          <p style={{fontSize:11,color:"#64748b",marginTop:2}}>{m.motivo} · {m.data}</p>
          {fn&&<p style={{fontSize:11,color:"#10b981",marginTop:1}}>↑ {fn.nome}</p>}
          {m.observacao&&<p style={{fontSize:11,color:"#94a3b8",fontStyle:"italic",marginTop:1}}>{m.observacao}</p>}
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <p style={{fontSize:16,fontWeight:800,color:m.tipo==="entrada"?"#10b981":"#ef4444"}}>{m.tipo==="entrada"?"+":"-"}{fmtN(m.quantidade)}</p>
          <p style={{fontSize:10,color:"#64748b",marginTop:1}}>{p?p.unidade:"un"}</p>
        </div>
      </div>;
    })}
    <Modal open={modal} onClose={()=>setModal(false)} title="Registrar Movimentacao">
      <Campo label="Tipo" req>
        <div style={{display:"flex",gap:8}}>
          {[{v:"entrada",l:"Entrada",col:"#10b981"},{v:"saida",l:"Saida",col:"#ef4444"}].map(x=>
            <button key={x.v} onClick={()=>ff("tipo",x.v)} style={{flex:1,background:form.tipo===x.v?x.col:"#0f1623",border:`1.5px solid ${form.tipo===x.v?x.col:"#2a3148"}`,borderRadius:10,padding:12,color:form.tipo===x.v?"#fff":"#64748b",cursor:"pointer",fontSize:14,fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <Ic n={x.v==="entrada"?"up":"down"} s={15} c={form.tipo===x.v?"#fff":"#64748b"}/>{x.l}
            </button>
          )}
        </div>
      </Campo>
      <Campo label="Produto" req>
        <select value={form.produtoId} onChange={e=>ff("produtoId",e.target.value)} style={SS}>
          <option value="">Selecionar produto...</option>
          {produtos.map(p=><option key={p.id} value={p.id}>{p.nome} ({p.sku})</option>)}
        </select>
      </Campo>
      {ps&&<div style={{background:"#0f1623",borderRadius:10,padding:"10px 12px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:fs?6:0}}>
          <span style={{fontSize:12,color:"#64748b"}}>Estoque atual</span>
          <span style={{fontSize:13,fontWeight:700,color:"#e8eaf6"}}>{ps.estoqueAtual} {ps.unidade}</span>
        </div>
        {fs&&<div style={{display:"flex",justifyContent:"space-between"}}>
          <span style={{fontSize:12,color:"#64748b"}}>Fornecedor</span>
          <span style={{fontSize:12,color:"#10b981",fontWeight:600}}>{fs.nome}</span>
        </div>}
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Campo label="Quantidade" req><input type="number" min="1" value={form.quantidade} onChange={e=>ff("quantidade",e.target.value)} placeholder="0" style={IS}/></Campo>
        <Campo label="Data" req><input type="date" value={form.data} onChange={e=>ff("data",e.target.value)} style={IS}/></Campo>
      </div>
      <Campo label="Motivo" req>
        <select value={form.motivo} onChange={e=>ff("motivo",e.target.value)} style={SS}>
          <option value="">Selecionar motivo...</option>
          {MOTIVOS[form.tipo].map(m=><option key={m} value={m}>{m}</option>)}
        </select>
      </Campo>
      <Campo label="Observacao"><input value={form.observacao} onChange={e=>ff("observacao",e.target.value)} placeholder="Ex: NF 1234..." style={IS}/></Campo>
      <div style={{display:"flex",gap:10,marginTop:8}}>
        <button onClick={()=>setModal(false)} style={{flex:1,background:"#2a3148",border:"none",borderRadius:12,padding:14,color:"#94a3b8",fontSize:15,cursor:"pointer",fontWeight:600}}>Cancelar</button>

}

// ── RELATORIOS ────────────────────────────────────────────
function Relatorios({produtos,movs,forns,hist}){
  const k=kpis(produtos,movs);
  const porCat=CATS.map((c,i)=>{const ps=produtos.filter(p=>p.categoria===c);return{cat:CATS_LABEL[i],qtd:ps.length,val:ps.reduce((s,p)=>s+p.estoqueAtual*p.precoCusto,0)};}).filter(x=>x.qtd>0).sort((a,b)=>b.val-a.val);
  const maxV=Math.max(...porCat.map(x=>x.val),1);
  const top5v=[...produtos].sort((a,b)=>(b.estoqueAtual*b.precoCusto)-(a.estoqueAtual*a.precoCusto)).slice(0,5);
  const top5s=[...produtos].map(p=>({...p,ts:movs.filter(m=>m.produtoId===p.id&&m.tipo==="saida").reduce((s,m)=>s+m.quantidade,0),tm:movs.filter(m=>m.produtoId===p.id).length})).sort((a,b)=>b.ts-a.ts).slice(0,5);
  const fornR=forns.map(f=>({...f,np:produtos.filter(p=>p.fornecedorId===f.id).length,vt:produtos.filter(p=>p.fornecedorId===f.id).reduce((s,p)=>s+p.estoqueAtual*p.precoCusto,0)})).filter(f=>f.np>0).sort((a,b)=>b.np-a.np);
  const vars=[];
  produtos.forEach(p=>{
    const hp=hist.filter(h=>h.produtoId===p.id).sort((a,b)=>b.data.localeCompare(a.data));
    if(hp.length>=2){const d=hp[0].preco-hp[1].preco;const pc=(d/hp[1].preco*100).toFixed(1);vars.push({...p,d,pc,pa:hp[1].preco,pa2:hp[0].preco,dt:hp[0].data});}
  });
  vars.sort((a,b)=>Math.abs(b.pc)-Math.abs(a.pc));

  const Sec=({t,children})=><div style={{background:"#1a1f2e",borderRadius:16,padding:16,marginBottom:14,border:"1.5px solid #2a3148"}}>

    <div style={{padding:"20px 0 16px"}}>
      <h1 style={{fontSize:22,fontWeight:800,color:"#e8eaf6"}}>Relatorios</h1>

      {[{l:"Giro de Estoque",v:k.giro+"%",sub:"saidas/entradas",col:"#6366f1",n:"chart"},{l:"Valor em Estoque",v:fmt(k.valorTotal),sub:"custo total",col:"#0ea5e9",n:"tag"},{l:"Total Entradas",v:fmtN(k.totalEntradas),sub:"unidades",col:"#10b981",n:"up"},{l:"Total Saidas",v:fmtN(k.totalSaidas),sub:"unidades",col:"#ef4444",n:"down"}].map((c,i)=>
        <div key={i} style={{background:"#1a1f2e",borderRadius:16,padding:"16px 14px",border:"1.5px solid #2a3148"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <p style={{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:".06em",fontWeight:700}}>{c.l}</p>
            <div style={{background:c.col+"20",borderRadius:8,padding:6}}><Ic n={c.n} s={13} c={c.col}/></div>

          <div key={i} style={{background:"#0f1623",borderRadius:12,padding:"14px 8px",textAlign:"center"}}>

    {vars.length>0&&<Sec t="Variacoes de Preco Recentes">
      {vars.slice(0,6).map((v,i)=><div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid #2a3148"}}>

    {fornR.length>0&&<Sec t="Fornecedores por Produtos">

function Alertas({produtos,hist,forns}){
  const zer=produtos.filter(p=>p.estoqueAtual===0);
  const crit=produtos.filter(p=>p.estoqueAtual>0&&p.estoqueAtual<=p.estoqueMinimo);
  const venc=produtos.filter(p=>{if(!p.validade)return false;return(new Date(p.validade)-new Date())/(864e5)<=30;});
  const max=produtos.filter(p=>p.estoqueMaximo>0&&p.estoqueAtual>=p.estoqueMaximo);
  const varA=[];
  produtos.forEach(p=>{
    const hp=hist.filter(h=>h.produtoId===p.id).sort((a,b)=>b.data.localeCompare(a.data));
    if(hp.length>=2){const pc=((hp[0].preco-hp[1].preco)/hp[1].preco*100);if(Math.abs(pc)>=10)varA.push({...p,pc:pc.toFixed(1),pa:hp[1].preco,pa2:hp[0].preco});}
  });
  const tot=zer.length+crit.length+venc.length+max.length+varA.length;

  function Grp({ico,tit,cor,fundo,lista,c1,c2}){
    if(!lista.length)return null;
    return <div style={{background:fundo,borderRadius:16,padding:16,marginBottom:14,border:`1.5px solid ${cor}30`}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
        <div style={{background:cor+"20",borderRadius:10,padding:7}}><Ic n={ico} s={15} c={cor}/></div>
        <p style={{fontSize:15,color:cor,fontWeight:700}}>{tit}</p>
        <span style={{background:cor+"20",color:cor,borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700,marginLeft:"auto"}}>{lista.length}</span>
      </div>
      {lista.map(p=><div key={p.id} style={{background:"#0f1623",borderRadius:12,padding:"12px 14px",marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:13,color:"#e8eaf6",fontWeight:700,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.nome}</p>
            <p style={{fontSize:11,color:"#64748b",marginTop:2}}>{p.sku} · {p.categoria}</p>
          </div>
          <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
            <p style={{fontSize:14,fontWeight:800,color:cor}}>{c1(p)}</p>
            {c2&&<p style={{fontSize:11,color:"#64748b",marginTop:1}}>{c2(p)}</p>}
          </div>
        </div>
        {p.leadTime>0&&<div style={{display:"flex",alignItems:"center",gap:6,marginTop:8,paddingTop:8,borderTop:"1px solid #2a3148"}}>
          <Ic n="truck" s={12} c="#64748b"/>
          <span style={{fontSize:11,color:"#64748b"}}>Lead: {p.leadTime}d · {forns.find(f=>f.id===p.fornecedorId)?.nome||"Sem fornecedor"}</span>
        </div>}
      </div>)}
    </div>;
  }

  return <div className="screen" style={{padding:"0 16px 110px"}}>
    <div style={{padding:"20px 0 16px"}}>
      <h1 style={{fontSize:22,fontWeight:800,color:"#e8eaf6"}}>Alertas</h1>
      <p style={{fontSize:13,color:"#64748b",marginTop:4}}>{tot} alerta{tot!==1?"s":""} ativo{tot!==1?"s":""}</p>
    </div>
    {tot===0&&<div style={{textAlign:"center",padding:"64px 0"}}>
      <div style={{width:72,height:72,background:"#10b98120",borderRadius:20,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px"}}><Ic n="check" s={36} c="#10b981"/></div>
      <h3 style={{color:"#10b981",marginBottom:8}}>Tudo sob controle!</h3>
      <p style={{color:"#64748b",fontSize:14}}>Nenhum alerta ativo no momento.</p>
    </div>}
    <Grp ico="close" tit="Produtos Zerados" cor="#ef4444" fundo="#1c0a0a" lista={zer} c1={p=>"0 "+p.unidade} c2={p=>"Minimo: "+p.estoqueMinimo}/>
    <Grp ico="alert" tit="Estoque Critico" cor="#f59e0b" fundo="#1c1500" lista={crit} c1={p=>p.estoqueAtual+" "+p.unidade} c2={p=>"Minimo: "+p.estoqueMinimo}/>
    <Grp ico="cal" tit="Vencimento em 30 dias" cor="#a855f7" fundo="#180c2a" lista={venc} c1={p=>p.validade} c2={()=>"Validade proxima"}/>
    <Grp ico="up" tit="Estoque no Maximo" cor="#0ea5e9" fundo="#0a1520" lista={max} c1={p=>p.estoqueAtual+" "+p.unidade} c2={p=>"Maximo: "+p.estoqueMaximo}/>
    <Grp ico="trend" tit="Variacao de Preco >= 10%" cor="#f97316" fundo="#1c0e00" lista={varA} c1={p=>p.pc>0?"▲ "+p.pc+"%":"▼ "+Math.abs(p.pc)+"%"} c2={p=>fmt(p.pa)+" → "+fmt(p.pa2)}/>
  </div>;
}

// Crypto PBKDF2 (Web Crypto API nativa)
async function hashPassword(password, salt){
  const enc=new TextEncoder();
  const key=await crypto.subtle.importKey('raw',enc.encode(password),{name:'PBKDF2'},false,['deriveBits']);
  const bits=await crypto.subtle.deriveBits({name:'PBKDF2',salt:enc.encode(salt),iterations:100000,hash:'SHA-256'},key,256);
  return Array.from(new Uint8Array(bits)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
function genSalt(){return Array.from(crypto.getRandomValues(new Uint8Array(16))).map(b=>b.toString(16).padStart(2,'0')).join('');}
function genToken(){return Array.from(crypto.getRandomValues(new Uint8Array(32))).map(b=>b.toString(16).padStart(2,'0')).join('');}

const authStore={
  users:   load('_au','[]') ? JSON.parse(load('_au','[]')||'[]') : [],
  session: (()=>{try{const s=localStorage.getItem('_as');return s?JSON.parse(s):null;}catch{return null;}})(),
  saveUsers(){ try{localStorage.setItem('_au',JSON.stringify(this.users));}catch{} },
  saveSession(){ try{localStorage.setItem('_as',JSON.stringify(this.session));}catch{} },
  isLoggedIn(){
    if(!this.session) return false;
    if(Date.now()>this.session.expiresAt){this.session=null;this.saveSession();return false;}
    return true;
  },
  logout(){this.session=null;this.saveSession();}
};

async function doRegister(nome,email,password){
  email=email.trim().toLowerCase();
  if(!nome||nome.length<2) return{ok:false,msg:'Nome deve ter ao menos 2 caracteres'};
  if(!validateEmail(email))  return{ok:false,msg:'E-mail inválido'};
  if(password.length<6)      return{ok:false,msg:'Senha deve ter ao menos 6 caracteres'};
  if(authStore.users.find(u=>u.email===email)) return{ok:false,msg:'E-mail já cadastrado'};
  const salt=genSalt(), hash=await hashPassword(password,salt);
  const user={id:Date.now(),nome:sanitize(nome.trim()),email,salt,hash,createdAt:hoje()};
  authStore.users.push(user); authStore.saveUsers();
  return{ok:true,user};
}
async function doLogin(email,password){
  email=email.trim().toLowerCase();
  const user=authStore.users.find(u=>u.email===email);
  if(!user) return{ok:false,msg:'E-mail não encontrado'};
  const hash=await hashPassword(password,user.salt);
  if(hash!==user.hash) return{ok:false,msg:'Senha incorreta'};
  authStore.session={token:genToken(),userId:user.id,email:user.email,nome:user.nome,expiresAt:Date.now()+7*24*60*60*1000};
  authStore.saveSession();
  return{ok:true,user};
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function gerarChaveNFe(){return Array.from(crypto.getRandomValues(new Uint8Array(22))).map(b=>b.toString().padStart(2,'0')).join('').slice(0,44);}
function calcTotalItens(itens){return(itens||[]).reduce((s,i)=>s+(parseFloat(i.valor_unitario)||0)*(parseInt(i.quantidade)||0),0);}

// Mock da API Focus NFe — em produção: trocar fetch para api.focusnfe.com.br
const focusNFe={
  async emitir(dados){
    await sleep(1400);
    if(!dados.natureza_operacao) return{ok:false,msg:'Natureza da operação obrigatória'};
    if(!dados.destinatario?.nome) return{ok:false,msg:'Nome do destinatário obrigatório'};
    if(!dados.destinatario?.cpf&&!dados.destinatario?.cnpj) return{ok:false,msg:'CPF ou CNPJ do destinatário obrigatório'};
    if(!dados.itens?.length) return{ok:false,msg:'Adicione ao menos um item'};
    const nf={

      numero:String(Math.floor(Math.random()*900000+100000)),

      dataEmissao:hoje(),
      dataAutorizacao:new Date().toISOString(),
      ...dados,
      valor_total:calcTotalItens(dados.itens),
    };
    return{ok:true,nf};
  },
  async cancelar(nfId,justificativa,notasFiscais){

    const nf=notasFiscais.find(n=>n.id===nfId);
    if(!nf) return{ok:false,msg:'NF não encontrada'};
    if(nf.status!=='autorizada') return{ok:false,msg:'Somente NFs autorizadas podem ser canceladas'};
    return{ok:true,nf:{...nf,status:'cancelada',justificativaCancelamento:justificativa.trim(),dataCancelamento:new Date().toISOString()}};
  }
};
